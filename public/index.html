<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Onlyflow - Hub de conexão com redes sociais"
    />
    <meta name="referrer" content="no-referrer" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Onlyflow</title>
  </head>
  <body>
    <noscript>Você precisa habilitar JavaScript para executar este app.</noscript>
    <div id="root"></div>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <!-- Facebook SDK para Cadastro incorporado do WhatsApp (API Oficial) -->
    <script>
      window.fbAsyncInit = function() {
        if (window.FB) {
          window.FB.init({
            appId: '2432564587163190',
            autoLogAppEvents: true,
            xfbml: true,
            version: 'v25.0'
          });
        }
      };
    </script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
  </body>
</html>
